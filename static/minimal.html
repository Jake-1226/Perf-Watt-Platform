<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Test Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; margin: 0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%); border-bottom: 1px solid #334155; padding: 14px 20px; }
        .btn { padding: 8px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; font-size: 14px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .input { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; width: 100%; font-size: 14px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.green { background: #22c55e; }
        .status-dot.red { background: #ef4444; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="module">
const html = htm.bind(React.createElement);
const { useState, useEffect } = React;

function App() {
    const [configs, setConfigs] = useState([]);
    const [loading, setLoading] = useState(true);
    
    useEffect(() => {
        setTimeout(() => {
            setLoading(false);
            setConfigs([
                { id: 1, name: "Test Server", os_ip: "100.71.148.76", os_user: "dell", idrac_ip: "100.71.148.195" }
            ]);
        }, 1000);
    }, []);
    
    return html`
    <div class="min-h-screen">
      <div class="bg-gradient-to-r from-slate-900 via-blue-950 to-slate-900 border-b border-blue-900/50 px-6 py-4">
        <div class="flex items-center justify-between max-w-[1400px] mx-auto">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">PT</div>
            <div>
              <h1 class="text-lg font-bold text-white leading-tight">Performance Test Platform</h1>
              <p class="text-blue-400 text-xs">Server Benchmarking & Power Telemetry</p>
            </div>
          </div>
          <div class="flex items-center gap-5">
            <div class="flex items-center gap-2"><span class="status-dot red"></span><span class="text-xs text-gray-400">OS</span></div>
            <div class="flex items-center gap-2"><span class="status-dot red"></span><span class="text-xs text-gray-400">iDRAC</span></div>
          </div>
        </div>
      </div>

      <div class="p-6">
        <div class="max-w-[1400px] mx-auto">
          ${loading ? html`
            <div class="text-center py-12 text-gray-400">
              <p class="text-lg mb-2">Loading...</p>
            </div>
          ` : html`
            <div class="space-y-6">
              <div class="text-center py-6">
                <h2 class="text-3xl font-bold text-white mb-2">Welcome to Performance Test Platform</h2>
                <p class="text-gray-400 max-w-xl mx-auto">Select a saved server configuration to begin testing, or create a new one.</p>
              </div>

              <div class="card">
                <div class="card-header flex justify-between items-center">
                  <h3 class="font-bold">Saved Server Configurations</h3>
                  <button class="btn btn-primary btn-sm">+ New Server</button>
                </div>
                <div class="p-4">
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${configs.map(c => html`
                      <div key=${c.id} class="bg-gray-800/50 border border-gray-700 rounded-lg p-4 hover:border-blue-600 transition-colors cursor-pointer">
                        <h4 class="font-bold text-white text-base mb-3">${c.name}</h4>
                        <div class="space-y-1 text-xs text-gray-400">
                          <div class="flex justify-between"><span>OS:</span><span class="text-gray-300 font-mono">${c.os_ip}</span></div>
                          <div class="flex justify-between"><span>User:</span><span class="text-gray-300">${c.os_user}</span></div>
                          ${c.idrac_ip && html`<div class="flex justify-between"><span>iDRAC:</span><span class="text-gray-300 font-mono">${c.idrac_ip}</span></div>`}
                        </div>
                        <div class="mt-3 pt-3 border-t border-gray-700 flex justify-between items-center">
                          <span class="text-xs text-gray-500">Ready</span>
                          <span class="text-xs text-blue-400 font-medium">Connect &rarr;</span>
                        </div>
                      </div>
                    `)}
                  </div>
                </div>
              </div>
            </div>
          `}
        </div>
      </div>
    </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
