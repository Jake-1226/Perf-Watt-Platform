version: '3.8'

services:
  perf-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perf-platform
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data:/opt/perf-platform/data
      - ./logs:/opt/perf-platform/logs
      - ./configs:/opt/perf-platform/configs
    environment:
      - PYTHONPATH=/opt/perf-platform
      - PLATFORM_HOST=0.0.0.0
      - PLATFORM_PORT=8001
    networks:
      - perf-platform-network
    healthcheck:
      test: ["CMD", "/opt/perf-platform/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: perf-platform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - perf-platform
    networks:
      - perf-platform-network

  # Optional: Add monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: perf-platform-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - perf-platform-network

  grafana:
    image: grafana/grafana:latest
    container_name: perf-platform-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - perf-platform-network

networks:
  perf-platform-network:
    driver: bridge

volumes:
  perf-platform-data:
    driver: local
  perf-platform-logs:
    driver: local
  perf-platform-configs:
    driver: local
